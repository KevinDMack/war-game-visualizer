{{- if .Values.webApp.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: web-app
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "war-game-visualizer.labels" . | nindent 4 }}
  {{- with .Values.webApp.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.webApp.ingress.className }}
  ingressClassName: {{ .Values.webApp.ingress.className }}
  {{- end }}
  {{- if .Values.webApp.ingress.tls }}
  tls:
    {{- toYaml .Values.webApp.ingress.tls | nindent 4 }}
  {{- end }}
  rules:
    - host: {{ .Values.webApp.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web-app
                port:
                  number: {{ .Values.webApp.service.port }}
{{- end }}
