# SecretProviderClass wires the Azure Key Vault CSI driver to Kubernetes secrets.
# The CSI driver add-on must be enabled on the AKS cluster (key_vault_secrets_provider block in Terraform).
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: azure-kv-secrets
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "war-game-visualizer.labels" . | nindent 4 }}
spec:
  provider: azure
  secretObjects:
    {{- range .Values.keyVault.secretObjects }}
    - secretName: {{ .secretName }}
      type: Opaque
      data:
        - objectName: {{ .keyVaultSecretName }}
          key: value
    {{- end }}
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: {{ .Values.workloadIdentity.clientId | quote }}
    keyvaultName: {{ .Values.keyVault.name | quote }}
    tenantId: {{ .Values.keyVault.tenantId | quote }}
    objects: |
      array:
        {{- range .Values.keyVault.secretObjects }}
        - |
          objectName: {{ .keyVaultSecretName }}
          objectType: secret
        {{- end }}
