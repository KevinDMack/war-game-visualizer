apiVersion: v1
kind: Service
metadata:
  name: web-app
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "war-game-visualizer.labels" . | nindent 4 }}
    app.kubernetes.io/name: web-app
spec:
  type: {{ .Values.webApp.service.type }}
  ports:
    - port: {{ .Values.webApp.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "war-game-visualizer.webApp.selectorLabels" . | nindent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: scenario-service
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "war-game-visualizer.labels" . | nindent 4 }}
    app.kubernetes.io/name: scenario-service
spec:
  type: {{ .Values.scenarioService.service.type }}
  ports:
    - port: {{ .Values.scenarioService.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "war-game-visualizer.scenarioService.selectorLabels" . | nindent 4 }}
