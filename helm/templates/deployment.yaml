apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-app
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "war-game-visualizer.labels" . | nindent 4 }}
    app.kubernetes.io/name: web-app
  annotations:
    dapr.io/enabled: "true"
    dapr.io/app-id: "web-app"
    dapr.io/app-port: {{ .Values.webApp.service.port | quote }}
spec:
  replicas: {{ .Values.webApp.replicaCount }}
  selector:
    matchLabels:
      {{- include "war-game-visualizer.webApp.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "war-game-visualizer.webApp.selectorLabels" . | nindent 8 }}
        azure.workload.identity/use: "true"
      annotations:
        dapr.io/enabled: "true"
        dapr.io/app-id: "web-app"
        dapr.io/app-port: {{ .Values.webApp.service.port | quote }}
    spec:
      serviceAccountName: {{ .Values.workloadIdentity.serviceAccountName }}
      containers:
        - name: web-app
          image: "{{ .Values.global.acrLoginServer }}/{{ .Values.webApp.image.repository }}:{{ .Values.global.imageTag }}"
          imagePullPolicy: {{ .Values.webApp.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.webApp.service.port }}
              protocol: TCP
          env:
            - name: CESIUM_ION_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cesium-ion-token
                  key: value
                  optional: true
          resources:
            {{- toYaml .Values.webApp.resources | nindent 12 }}
          volumeMounts:
            - name: secrets-store
              mountPath: /mnt/secrets
              readOnly: true
      volumes:
        - name: secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: azure-kv-secrets
---
